<div class="crm-section">

  <!-- ── Left: Contact List ────────────────────────────────── -->
  <div class="crm-list-panel" id="crm-list-panel">

    <div class="crm-tabs">
      <button class="crm-tab active" id="crm-tab-clients" onclick="crmSwitchTab('clients')">Clients</button>
      <button class="crm-tab" id="crm-tab-collaborators" onclick="crmSwitchTab('collaborators')">Collaborators</button>
    </div>

    <div class="crm-list-header">
      <div class="crm-search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="crm-search" class="crm-search-input" placeholder="Search…" autocomplete="off" oninput="crmFilterList()">
      </div>
      <button class="btn-primary crm-new-btn" id="crm-new-btn" onclick="crmOpenNew()">+ New Client</button>
    </div>

    <div class="crm-list" id="crm-list"></div>

  </div>

  <!-- ── Right: Detail Panel ───────────────────────────────── -->
  <div class="crm-detail-panel" id="crm-detail-panel">

    <div class="crm-detail-empty" id="crm-detail-empty">
      <svg viewBox="0 0 24 24" width="40" height="40">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <p>Select a contact to view details</p>
    </div>

    <div class="crm-detail-content" id="crm-detail-content" style="display:none">
      <!-- Populated by crmRenderDetail() -->
    </div>

  </div>

</div>

<!-- ── Confirm Modal ──────────────────────────────────────── -->
<div class="crm-modal-overlay" id="crm-modal-overlay" style="display:none">
  <div class="crm-modal">
    <h3 id="crm-modal-title">Are you sure?</h3>
    <p id="crm-modal-msg"></p>
    <div class="crm-modal-btns">
      <button class="btn-ghost" onclick="crmModalCancel()">Cancel</button>
      <button class="btn-danger" onclick="crmModalConfirm()">Delete</button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────────────── -->
<div class="fi-toast" id="crm-toast"></div>
