<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelance Control Centre</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Anybody:wght@700;800&display=swap" rel="stylesheet">

  <!-- Styles (order matters) -->
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/sidebar.css">
  <link rel="stylesheet" href="style/components.css">
  <link rel="stylesheet" href="style/home.css">
  <link rel="stylesheet" href="style/finance.css">
  <link rel="stylesheet" href="style/tasks.css">
</head>
<body>

  <!-- ── Auth Gate ──────────────────────────────────────── -->
  <div id="auth-gate">
    <div class="auth-modal">
      <div class="auth-logo">FCC</div>
      <p class="auth-subtitle">Freelance Control Centre</p>

      <label for="password-input">Password</label>
      <input type="password" id="password-input" placeholder="Enter password…" autocomplete="current-password">

      <div class="auth-error" id="auth-error"></div>

      <label class="auth-remember">
        <input type="checkbox" id="remember-me">
        Remember me for 30 days
      </label>

      <button class="btn-primary" id="unlock-btn" style="width:100%;justify-content:center;">Unlock</button>
    </div>
  </div>

  <!-- ── App Shell ──────────────────────────────────────── -->
  <div id="app" style="display:none;">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <span class="sidebar-logo-mark">FCC</span>
      </div>

      <div class="nav-items">

        <!-- Home -->
        <button class="nav-btn" data-section="home" data-label="Home" aria-label="Home">
          <svg viewBox="0 0 24 24">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </button>

        <!-- Finance -->
        <button class="nav-btn" data-section="finance" data-label="Finance" aria-label="Finance">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="5" width="20" height="14" rx="2"/>
            <path d="M2 10h20"/>
            <path d="M6 15h2M10 15h2"/>
          </svg>
        </button>

        <!-- Tasks -->
        <button class="nav-btn" data-section="tasks" data-label="Tasks" aria-label="Tasks">
          <svg viewBox="0 0 24 24">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </button>

        <!-- CRM -->
        <button class="nav-btn" data-section="crm" data-label="CRM" aria-label="CRM">
          <svg viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </button>

        <!-- Projects -->
        <button class="nav-btn" data-section="projects" data-label="Projects" aria-label="Projects">
          <svg viewBox="0 0 24 24">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
          </svg>
        </button>

        <!-- Documents -->
        <button class="nav-btn" data-section="documents" data-label="Documents" aria-label="Documents">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
          </svg>
        </button>

      </div>
    </nav>

    <!-- Content Area -->
    <main id="content">
      <div id="section-panel"></div>
    </main>

  </div>

  <!-- Scripts (order matters) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/router.js"></script>
  <script src="js/home.js"></script>
  <script src="js/finance.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
